<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkHub Coworking</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/styles.css">
    

</head>
<body>

    <!-- Hero Section -->

 <section class="hero container">

    <div class="row align-items-center">

                    <!-- texto -->
       <div class="col-12 col-lg-6 hero-text">

                    <p class="badge-open">• COWORKING</p>

                    <h1 class="titulo-hero">
                    Work Hub<br>
                    <span>Donde las ideas se conectan</span>
                    </h1>

                    <p class="descripcion-hero">
                    Descubre espacios de coworking diseñados para ti y tu equipo de trabajo, fomentando la productividad,
                    creatividad y conexión.
                    </p>
                   
                        <!-- botones -->
                        <div class="hero-botones">

                            <a href="#" class="btn btn-primary btn-lg ">
                            Reserva tu espacio
                            </a>

                            <a href="#" class="btn btn-light btn-lg">
                            Explorar espacios
                            </a>
                        </div>


                        <!-- AVATARS USUARIOS -->

                 <div class="usuarios d-flex align-items-center mt-3">

                        <div class="avatars">

                        <img src="resources/usuario1.png" alt="usuario">
                        <img src="resources/usuario2.png" alt="usuario">
                        <img src="resources/usuario3.png" alt="usuario">

                  </div>
        
                        <span class="ml-3 texto-usuarios">
                        Más de 10k profesionales trabajan con nosotros
                        </span>
            </div>
      </div>
           <!-- imagen derecha con carrusel -->
            <div class="col-12 col-lg-6 hero-img">

               <div id="heroCarousel" class="carousel slide" data-ride="carousel" data-interval="3000">

                    <div class="carousel-inner rounded shadow">

                        <div class="carousel-item active">
                        <img src="resources/coworking.jpg" class="d-block w-100 hero-img-size" alt="Espacio cowork">
                        </div>

                        <div class="carousel-item">
                        <img src="resources/coworking2.jpg" class="d-block w-100 hero-img-size" alt="Oficina compartida">
                        </div>

                        <div class="carousel-item">
                        <img src="resources/coworking3.jpg" class="d-block w-100 hero-img-size" alt="Sala de reuniones">
                        </div>

                        <div class="carousel-item">
                        <img src="resources/coworking4.png" class="d-block w-100 hero-img-size" alt="Espacio de trabajo">
                        </div>
                    
                    </div>
               </div>
          </div>
      </div>
 </div>

</section>

    <!-- Fin Hero Section -->



    <!-- Bootstrap JavaScript Libraries -->
 <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
<!-- Javascript -->
<script src="assets/scripts.js"></script>
                
</body>


</html>
