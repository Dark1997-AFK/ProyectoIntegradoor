<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/reserva-forms.css">
</head>
<body>
    <div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h2 class="fw-bold text-center mb-4">Reserva tu Espacio</h2>
                <form id="reservationForm">
                    <div class="mb-3">
                        <label for="resName" class="form-label fw-medium small">Nombre Completo</label>
                        <input type="text" class="form-control rounded-3" id="resName" placeholder="Tu nombre" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="resEmail" class="form-label fw-medium small">Correo Electrónico</label>
                            <input type="email" class="form-control rounded-3" id="resEmail" placeholder="nombre@ejemplo.com" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="resPhone" class="form-label fw-medium small">Teléfono</label>
                            <input type="tel" class="form-control rounded-3" id="resPhone" placeholder="+56 9 ...">
                        </div>
                    </div>

                    <hr class="my-4 opacity-25">

                    <div class="mb-3">
                        <label for="roomType" class="form-label fw-medium small">Tipo de Espacio</label>
                        <select class="form-select rounded-3" id="roomType" required>
                            <option value="" selected disabled>Selecciona una opción</option>
                            <option value="privada">Oficina Privada</option>
                            <option value="reuniones">Sala de Reuniones</option>
                            <option value="flexible">Escritorio Flexible</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="resDate" class="form-label fw-medium small">Fecha</label>
                            <input type="date" class="form-control rounded-3" id="resDate" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="resPeople" class="form-label fw-medium small">N° de Personas</label>
                            <input type="number" class="form-control rounded-3" id="resPeople" min="1" max="20" placeholder="1">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label for="startTime" class="form-label fw-medium small">Hora Inicio</label>
                            <input type="time" class="form-control rounded-3" id="startTime" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label for="endTime" class="form-label fw-medium small">Hora Fin</label>
                            <input type="time" class="form-control rounded-3" id="endTime" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3 mt-3 rounded-3">
                        Confirmar Reserva
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="../js/reservas.js"></script>
</body>
</html>
