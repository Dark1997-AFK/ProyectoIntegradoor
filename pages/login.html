<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="">
    <header>
        <!-- --------barra de navegación------>
  <nav class="navbar navbar-expand-lg navbar-light shadow-sm py-1 py-md-1 py-lg-2">
    <div class="container">
      <img class="logo d-inline-block align-top" src="../assets/Logo.png" alt="Logo WorkHub Coworking">
      <!-- menu hamburguesa -->
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <!-- lista de enlaces -->
        <ul class="navbar-nav ml-auto mr-3 mr-md-4 mr-lg-5"> <!-- con margin right (mr) para separar de los botones-->
          <li class="nav-item mx-0 mx-md-1 mx-lg-2">
            <a class="nav-link" href="#">Espacios</a>
          </li>
          <li class="nav-item mx-0 mx-md-1 mx-lg-2">
            <a class="nav-link" href="#">Precios</a>
          </li>
          <li class="nav-item mx-0 mx-md-1 mx-lg-2">
            <a class="nav-link" href="#">Conócenos</a>
          </li>
        </ul>
        <!-- boton login y logout -->
        <a href="" class="btn btn-login mr-2">Iniciar sesión</a>
        <a href="" class="btn btn-signup">Registrarse</a>
      </div>
    </div>
  </nav>
    </header>
    <section class="d-flex mx-auto">
        <img src="../assets/Logo.png" alt="CoWork Logo" class="img-fluid">
        <h2 class="fw-bold fs-5">CoWork</h2>
    </section>
     <main class="mx-auto">
        <h1 class="fw-bold">Welcome Back</h1>
        <h3 class="fw-normal fs-6">Please enter your details to access your dashboard.</h3>
    </main>
     <div class="container p-0">
        <div class="form-container">
            <form action="">
                <div class="mb-3">
                    <label for="email" class="form-label fw-medium small">Email Address</label>
                    <div class="form-input-icon-email">
                        <i class="bi bi-envelope fs-5"></i>
                    <input type="email" class="form-control rounded-4" id="email" aria-describedby="emailHelp" placeholder="alex@example.com">
                    </div>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label fw-medium small">Password</label>
                        <a href="" class="text-decoration-none fw-semibold">Forgot Password?</a>
                    </div>
                <div class="form-input-icon-password"> 
                    <i class="bi bi-lock fs-5"></i>
                    <input type="password" class="form-control rounded-4" id="password" placeholder="••••••••">
                    <button type="button" class="toggle-eye" id="togglePassword" aria-label="Show password">
                    <i class="bi bi-eye fs-5"></i>
                    </button>
                </div>
                <div class="form-check form-switch d-flex gap-2 ">
                        <input class="form-check-input" type="checkbox" id="keepLogged">
                        <label class="form-check-label fw-regular small" for="keepLogged">
                            Keep me logged in
                        </label>
                    </div>
                </div>
                <button type="submit" class=" fw-bold py-3 rounded-4">Sign In</button>
            </form>
            <div class="divider">
                <span>OR CONTINUE WITH</span>
            </div>
            <div class="social-login d-flex">
                <button class="google-btn rounded-4"><i class="bi bi-google"></i> Google</button>
                <button class="github-btn rounded-4"><i class="bi bi-github"></i> GitHub</button>
            </div>
            <div class="create-account d-flex mt-5">
                <span class="fw-regular create-account-text">Don't have an account?</span>
                <a href="" class="text-decoration-none fw-bold">Create an account</a>
            </div>
        </div>
     </div> 
     <footer>

     </footer>   
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>             
</body>
</html>
